# Parameter sweep: border_distance x word_batch for EN-ZH
# Produces Pareto frontier of quality vs latency tradeoffs
name: sweep-bd-wb-en-zh
backend:
  type: alignatt
  model: /path/to/HY-MT1.5-7B-Q5_K_M.gguf
  context_sentences: 0
  top_k_heads: 10
eval:
  direction: en-zh
  n_sentences: 50
  suite: flores
  comet: true
notes: >
  Sweep bd={2,3,4,5} x wb={1,2,3} on EN-ZH to find Pareto-optimal configs.
  Run with: python -m nllw.bench --sweep "bd=2,3,4,5 wb=1,2,3" --lang en-zh --comet --save
tags:
  - sweep
  - en-zh
  - pareto
