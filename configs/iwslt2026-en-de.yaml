# IWSLT 2026 SST -- EN-DE optimal configuration
# Model: HY-MT1.5-7B-Q8_0.gguf
# Best FLORES (iteration 16): COMET=0.881, YAAL=4.06 at bd=2/wb=3/top_p
# Previous: COMET=0.853 (iter 15, bd=3/wb=3/ts_vote)
# Dedicated head config available (90% overlap with en-zh)

model_path: /app/models/hymt1.5-7b-q8_0.gguf
heads_path: /app/heads/translation_heads_hymt_en_zh.json
direction: en-de
backend_type: alignatt
prompt_format: hymt
border_distance: 2
word_batch: 3
aggregation: top_p
top_p_threshold: 0.75  # Tuned: COMET 0.881 (same as 0.80 but lower latency)
context_sentences: 0
n_ctx: 2048
n_gpu_layers: 99
top_k_heads: 10

# Repetition halt: neutral for EN-DE (0.000 delta), keep disabled for safety
# repetition_max_repeats: 2

# Longform mode (competition format: one output per recording)
longform: true
auto_sentence_boundary: true

# SimulStream settings
sample_rate: 16000
min_start_seconds: 0.5
speech_chunk_size: 960
