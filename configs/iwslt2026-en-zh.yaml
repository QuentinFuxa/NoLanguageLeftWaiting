# IWSLT 2026 SST -- EN-ZH optimal configuration
# Model: HY-MT1.5-7B-Q8_0.gguf
# Best FLORES (iteration 27, 20 sent): XCOMET-XL=0.8706, COMET=0.883, YAAL=4.84
# EDT + entropy_gated: +0.0154 XCOMET-XL vs baseline, -9.2% YAAL
# Iteration 22: YAAL fix (batch_first_emission_time)

model_path: /app/models/hymt1.5-7b-q8_0.gguf
heads_path: /app/heads/translation_heads_hymt_en_zh.json
direction: en-zh
backend_type: alignatt
prompt_format: hymt
border_distance: 3
word_batch: 4
aggregation: top_p
top_p_threshold: 0.85  # Tuned: COMET 0.896 (=offline!) vs 0.895 at 0.80
context_sentences: 0
n_ctx: 2048
n_gpu_layers: 99
top_k_heads: 10

# EDT (entropy dynamic temperature, iter 25): +0.0075 XCOMET-XL EN-ZH
# Per-token adaptive temperature from logit entropy. GPU-validated iter 27.
entropy_dynamic_temperature: true
generation_temperature: 0.1

# Entropy-gated top_p (iter 24): +0.0042 XCOMET-XL EN-ZH, -9.2% YAAL
# Per-token top_p threshold modulation from attention entropy. GPU-validated iter 27.
entropy_gated_top_p: true

# Dead ends for EN-ZH (GPU-validated iter 27):
# - Anti-LM: COMET 0.747 (baseline 0.884) -- DEVASTATING
# - Final refinement: COMET 0.794 (baseline 0.884) -- DEVASTATING
# - Confidence trim: neutral (no effect on HY-MT)
# - Confidence-adaptive wb: hurts XCOMET-XL (-0.012)

# Longform mode (competition format: one output per recording)
longform: true
auto_sentence_boundary: true

# SimulStream settings
sample_rate: 16000
min_start_seconds: 0.5
speech_chunk_size: 960
