# IWSLT 2026 SST -- EN-ZH optimal configuration
# Model: HY-MT1.5-7B-Q8_0.gguf
# Best FLORES (iteration 15): COMET=0.879, YAAL=3.60 at bd=2/wb=3
# Previous best (iwslt26-sst): XCOMET-XL 0.842

model_path: /app/models/hymt1.5-7b-q8_0.gguf
heads_path: /app/heads/translation_heads_hymt_en_zh.json
direction: en-zh
backend_type: alignatt
prompt_format: hymt
border_distance: 2
word_batch: 3
context_sentences: 0
n_ctx: 2048
n_gpu_layers: 99
top_k_heads: 10

# Signals (validated on GPU, iteration 15)
# shift_k_threshold: 0.4   # -0.003 COMET, not recommended alone
# coverage_threshold: 0.3  # TBD
# repetition_max_repeats: 2

# SimulStream settings
sample_rate: 16000
min_start_seconds: 0.5
speech_chunk_size: 960
