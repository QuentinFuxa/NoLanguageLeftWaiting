# IWSLT 2026 SST -- EN-ZH optimal configuration
# Model: HY-MT1.5-7B-Q8_0.gguf
# Best FLORES (iteration 18, 100 sent): COMET=0.894 [0.887, 0.901], YAAL=6.09
# 99.8% of offline quality (full-sentence COMET=0.896)
# Iteration 22: YAAL fix (batch_first_emission_time) -- YAAL should be lower

model_path: /app/models/hymt1.5-7b-q8_0.gguf
heads_path: /app/heads/translation_heads_hymt_en_zh.json
direction: en-zh
backend_type: alignatt
prompt_format: hymt
border_distance: 3
word_batch: 4
aggregation: top_p
top_p_threshold: 0.85  # Tuned: COMET 0.896 (=offline!) vs 0.895 at 0.80
context_sentences: 0
n_ctx: 2048
n_gpu_layers: 99
top_k_heads: 10

# Repetition halt: DISABLED for EN-ZH (-0.004 COMET penalty at 50 sent)
# repetition_max_repeats: 2

# Longform mode (competition format: one output per recording)
longform: true
auto_sentence_boundary: true

# SimulStream settings
sample_rate: 16000
min_start_seconds: 0.5
speech_chunk_size: 960
