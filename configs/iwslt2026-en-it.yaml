# IWSLT 2026 SST -- EN-IT optimal configuration
# Model: HY-MT1.5-7B-Q8_0.gguf
# Best FLORES (iteration 16): COMET=0.884, YAAL=4.20 at bd=2/wb=3/top_p
# Previous: COMET=0.864 (iter 15, bd=3/wb=3/ts_vote)
# Dedicated head config available (90% overlap with en-zh)

model_path: /app/models/hymt1.5-7b-q8_0.gguf
heads_path: /app/heads/translation_heads_hymt_en_zh.json
direction: en-it
backend_type: alignatt
prompt_format: hymt
border_distance: 2
word_batch: 3
aggregation: top_p
top_p_threshold: 0.9   # Tuned: COMET 0.891 (+0.001 over 0.80)
context_sentences: 0
n_ctx: 2048
n_gpu_layers: 99
top_k_heads: 10

# Repetition halt: not tested for EN-IT, disabled by default
# repetition_max_repeats: 2

# SimulStream settings
sample_rate: 16000
min_start_seconds: 0.5
speech_chunk_size: 960
