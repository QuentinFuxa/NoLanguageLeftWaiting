# IWSLT 2026 SST -- EN-IT optimal configuration
# Model: HY-MT1.5-7B-Q8_0.gguf
# Best result (iwslt26-sst): XCOMET-XL 0.752
# Note: EN-IT uses wb=3 (confirmed +1.5 BLEU over wb=2)
# Note: EN-IT is NEW for 2026 (replaces EN-JP from 2025)

model_path: /app/models/hymt1.5-7b-q8_0.gguf
heads_path: /app/heads/translation_heads_hymt_en_it.json
direction: en-it
backend_type: alignatt
prompt_format: hymt
border_distance: 3
word_batch: 3
context_sentences: 0
n_ctx: 2048
top_k_heads: 10

# Recommended signals (to be validated on GPU)
